# Coverage gate: 80% (CICD-02 requirement satisfied — Phase 9 gap closure).
name: CI

on:
  push:
  pull_request:

jobs:
  ci:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv pip install -e ".[semantic]" pytest-cov "ruff>=0.15,<0.16" pytest-asyncio

      - name: Lint
        run: ruff check --output-format=github .

      - name: Test with coverage
        run: pytest --cov=remind_me_mcp --cov-report=term-missing --cov-fail-under=80
