openapi: 3.0.3
info:
  title: Remind Me — Dashboard REST API
  version: "1.2.0"
  description: |
    The `GET /api/*` REST surface served by `remind_me_mcp/api.py` (the
    dashboard's HTTP backend) — the same operations available as MCP tools,
    exposed over plain HTTP so any language/tool can talk to a running
    remind_me instance without an MCP client.

    Published so client SDKs can be generated for free from this spec
    instead of remind_me maintaining hand-written TS/Rust/etc. SDKs itself
    (see the "Client SDKs" note in the main README) — feed this file to
    `openapi-generator`, `openapi-typescript`, or similar.

    This spec is maintained by hand alongside `api.py`; if you add or change
    a route there, update this file in the same change.
  license:
    name: MIT

servers:
  - url: http://127.0.0.1:5199
    description: Default local dashboard server (`remind-me-mcp --serve-ui`)

security:
  - bearerAuth: []

paths:
  /health:
    get:
      operationId: health
      summary: Liveness probe
      description: Unauthenticated. Reveals no data — used by pid.py's health check.
      security: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok

  /api/stats:
    get:
      operationId: getStats
      summary: Aggregate statistics about the memory store
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  total:
                    type: integer
                  imports:
                    type: integer
                  categories:
                    type: object
                    additionalProperties:
                      type: integer
                  sources:
                    type: object
                    additionalProperties:
                      type: integer
                  tags:
                    type: object
                    additionalProperties:
                      type: integer
                    description: Tag name -> count, sorted descending by count.
                  db_path:
                    type: string
                  db_size_mb:
                    type: number
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/vitality:
    get:
      operationId: getVitalityReport
      summary: Vault vitality report -- active/dormant counts, health score, and vitality-bucket distribution
      description: >-
        Same computation as the remind_me_vitality_report MCP tool, exposed
        over REST so the dashboard can render the vitality-bucket chart.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  total_memories:
                    type: integer
                  active_count:
                    type: integer
                  dormant_count:
                    type: integer
                  average_vitality:
                    type: number
                  vault_health_score:
                    type: string
                    description: Percentage of active memories, e.g. "82%".
                  decay_distribution:
                    type: object
                    additionalProperties:
                      type: integer
                    description: memory_type -> count.
                  vitality_buckets:
                    type: object
                    additionalProperties:
                      type: integer
                    description: >-
                      Vitality-range label (e.g. "0.00-0.05", "0.75+") ->
                      count. The top bucket is open-ended since accessed
                      memories can exceed 1.0.
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/memories:
    get:
      operationId: listMemories
      summary: List memories with optional filters and pagination
      parameters:
        - $ref: "#/components/parameters/Category"
        - name: source
          in: query
          schema:
            type: string
        - $ref: "#/components/parameters/Tags"
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
            maximum: 200
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
            minimum: 0
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  total:
                    type: integer
                  count:
                    type: integer
                  offset:
                    type: integer
                  has_more:
                    type: boolean
                  memories:
                    type: array
                    items:
                      $ref: "#/components/schemas/Memory"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      operationId: addMemory
      summary: Create a new memory
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [content]
              properties:
                content:
                  type: string
                  minLength: 1
                category:
                  type: string
                  default: general
                tags:
                  type: array
                  items:
                    type: string
                  default: []
                source:
                  type: string
                  default: manual
                metadata:
                  type: object
                  default: {}
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Memory"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "415":
          $ref: "#/components/responses/UnsupportedMediaType"

  /api/memories/search:
    get:
      operationId: searchMemories
      summary: "Full-text search (FTS5), with an entity: token extension"
      description: |
        `q` may embed an `entity:NAME` or `entity:"Full Name"` token, which
        filters to memories linked to that resolved entity (or whose
        structured subject/object matches it) in addition to any remaining
        free-text FTS5 query. An `entity:`-only query (no text left) lists
        matching memories newest-first instead of FTS-ranking them.
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
            maximum: 200
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
            minimum: 0
        - $ref: "#/components/parameters/Category"
        - $ref: "#/components/parameters/Tags"
      responses:
        "200":
          description: OK. If an `entity:` token doesn't resolve, total/count are 0 and `message` explains why.
          content:
            application/json:
              schema:
                type: object
                properties:
                  total:
                    type: integer
                  count:
                    type: integer
                  offset:
                    type: integer
                  limit:
                    type: integer
                  has_more:
                    type: boolean
                  memories:
                    type: array
                    items:
                      $ref: "#/components/schemas/Memory"
                  message:
                    type: string
        "400":
          description: Missing `q`, invalid `limit`/`offset`, or malformed FTS5 query syntax.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/memories/bulk/delete:
    post:
      operationId: bulkDeleteMemories
      summary: Delete multiple memories by id in one request
      description: |
        Applies the exact same per-memory logic as `DELETE /api/memories/{id}`
        (chunk vector + ANN cleanup, soft-delete when sync is configured) to
        each id independently -- a missing id doesn't fail the rest of the
        batch, it's reported in `not_found` instead. Capped at 200 ids per
        request; select the batch client-side (from a list/search result)
        rather than passing a filter, so a request can never silently affect
        more than the caller explicitly selected.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [ids]
              properties:
                ids:
                  type: array
                  items:
                    type: string
                  minItems: 1
                  maxItems: 200
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  deleted:
                    type: array
                    items:
                      type: string
                  not_found:
                    type: array
                    items:
                      type: string
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "415":
          $ref: "#/components/responses/UnsupportedMediaType"

  /api/memories/bulk/tag:
    post:
      operationId: bulkTagMemories
      summary: Add, remove, or set tags on multiple memories in one request
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [ids, tags]
              properties:
                ids:
                  type: array
                  items:
                    type: string
                  minItems: 1
                  maxItems: 200
                tags:
                  type: array
                  items:
                    type: string
                  minItems: 1
                mode:
                  type: string
                  enum: [add, remove, set]
                  default: add
                  description: >-
                    add: union onto each memory's existing tags (default).
                    remove: drop these tags if present. set: replace each
                    memory's tags wholesale.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  updated:
                    type: array
                    items:
                      type: string
                  not_found:
                    type: array
                    items:
                      type: string
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "415":
          $ref: "#/components/responses/UnsupportedMediaType"

  /api/memories/bulk/reclassify:
    post:
      operationId: bulkReclassifyMemories
      summary: Apply memory_type classifications to multiple memories
      description: |
        Mirrors the `remind_me_reclassify` MCP tool exactly: sets each
        memory's `memory_type` and its matching `decay_rate`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [classifications]
              properties:
                classifications:
                  type: array
                  minItems: 1
                  maxItems: 200
                  items:
                    type: object
                    required: [memory_id, memory_type]
                    properties:
                      memory_id:
                        type: string
                      memory_type:
                        type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  updated:
                    type: integer
                  not_found:
                    type: array
                    items:
                      type: string
                  total:
                    type: integer
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "415":
          $ref: "#/components/responses/UnsupportedMediaType"

  /api/memories/{memory_id}:
    parameters:
      - name: memory_id
        in: path
        required: true
        schema:
          type: string
    get:
      operationId: getMemory
      summary: Retrieve a single memory by id
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Memory"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      operationId: updateMemoryPut
      summary: Update fields on an existing memory (see PATCH)
      requestBody:
        $ref: "#/components/requestBodies/MemoryUpdate"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Memory"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "415":
          $ref: "#/components/responses/UnsupportedMediaType"
    patch:
      operationId: updateMemoryPatch
      summary: Update fields on an existing memory
      description: |
        Only fields present (and non-null) in the body are changed. `content`
        triggers re-embedding. Identical behavior to PUT on this endpoint —
        both are accepted as a partial update, there is no separate
        full-replace semantic.
      requestBody:
        $ref: "#/components/requestBodies/MemoryUpdate"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Memory"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "415":
          $ref: "#/components/responses/UnsupportedMediaType"
    delete:
      operationId: deleteMemory
      summary: Permanently delete a memory
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  deleted:
                    type: string
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/entity:
    get:
      operationId: getEntity
      summary: Look up a knowledge-graph entity by name or alias
      description: |
        Deterministic-id resolution on the canonical name first, then a
        case-insensitive name/alias scan (mirrors the `remind_me_entity` MCP
        tool). Superseded memories are excluded; dangling sync links are
        invisible.
      parameters:
        - name: name
          in: query
          required: true
          schema:
            type: string
        - name: limit
          in: query
          description: Max facts and max linked memories returned.
          schema:
            type: integer
            default: 20
            maximum: 100
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  entity:
                    type: object
                    properties:
                      id:
                        type: string
                      name:
                        type: string
                      kind:
                        type: string
                        nullable: true
                      aliases:
                        type: array
                        items:
                          type: string
                  facts:
                    type: array
                    items:
                      $ref: "#/components/schemas/Memory"
                  memories:
                    type: array
                    items:
                      $ref: "#/components/schemas/Memory"
                  total_linked_memories:
                    type: integer
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: No entity found matching `name`.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/entities:
    get:
      operationId: listEntities
      summary: List entities, most-mentioned first (issue #15)
      description: |
        There's no equivalent MCP tool -- `remind_me_entity` is
        lookup-by-name/alias only -- this is a dashboard-only need, powering
        the entity browser's list panel.
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
            maximum: 200
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  total:
                    type: integer
                  count:
                    type: integer
                  offset:
                    type: integer
                  limit:
                    type: integer
                  has_more:
                    type: boolean
                  entities:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        name:
                          type: string
                        kind:
                          type: string
                          nullable: true
                        aliases:
                          type: array
                          items:
                            type: string
                        updated_at:
                          type: string
                        mention_count:
                          type: integer
                          description: Number of linked memories (via memory_entities).
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/entity/traverse:
    get:
      operationId: getEntityTraversal
      summary: Multi-hop traversal of the typed entity-relation graph (issue #15)
      description: |
        Mirrors the `remind_me_entity_traverse` MCP tool: follows
        `entity_relations` edges in both directions from the starting
        entity, up to `hops` steps. Used by the dashboard's entity detail
        panel to drill down into related entities.
      parameters:
        - name: name
          in: query
          required: true
          description: Starting entity name or alias.
          schema:
            type: string
        - name: hops
          in: query
          schema:
            type: integer
            default: 1
            minimum: 1
            maximum: 3
        - name: relation
          in: query
          description: Optional exact-match filter on the relation label.
          schema:
            type: string
        - name: cap
          in: query
          description: Maximum number of edges returned, across all hops.
          schema:
            type: integer
            default: 20
            maximum: 100
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  entity:
                    type: object
                    properties:
                      id:
                        type: string
                      name:
                        type: string
                      kind:
                        type: string
                        nullable: true
                  hops:
                    type: integer
                  edges:
                    type: array
                    items:
                      type: object
                      properties:
                        subject_entity_id:
                          type: string
                        subject_name:
                          type: string
                        subject_kind:
                          type: string
                          nullable: true
                        relation:
                          type: string
                        object_entity_id:
                          type: string
                        object_name:
                          type: string
                        object_kind:
                          type: string
                          nullable: true
                        hop:
                          type: integer
                  entities:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        name:
                          type: string
                        kind:
                          type: string
                          nullable: true
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: No entity found matching `name`.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/wiki:
    get:
      operationId: listWikiPages
      summary: List every LLM Wiki page (FT-08)
      description: |
        The wiki (`config.WIKI_DIR`) is a synthesis layer distinct from raw
        memories — markdown pages Claude curates via the `remind_me_wiki_*`
        tools. This surface is read-only by design: writing stays an
        MCP-tool-only, LLM-curated action (see SCHEMA.md), so there is no
        POST/PUT/DELETE here. The on-disk files are reconciled into the
        `wiki_pages`/`wiki_fts` cache before every read.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  count:
                    type: integer
                  pages:
                    type: array
                    items:
                      $ref: "#/components/schemas/WikiPageSummary"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/wiki/search:
    get:
      operationId: searchWiki
      summary: Full-text search the wiki (title + body)
      description: BM25-ranked over `wiki_fts`; distinct from `/api/memories/search`.
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
            maximum: 50
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  count:
                    type: integer
                  results:
                    type: array
                    items:
                      $ref: "#/components/schemas/WikiSearchResult"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/wiki/load:
    get:
      operationId: loadWiki
      summary: Concatenate the whole wiki into one blob (the core LLM-Wiki move)
      description: |
        Pages are concatenated newest-revised first until `token_budget`
        (estimated `len // 4`) is hit; the rest are listed as omitted.
      parameters:
        - name: token_budget
          in: query
          description: Ceiling in estimated tokens. Omit to use `config.WIKI_LOAD_TOKEN_BUDGET`; `0` means unlimited.
          schema:
            type: integer
        - name: include_index
          in: query
          description: Prepend the page catalogue.
          schema:
            type: boolean
            default: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  content:
                    type: string
                  pages_included:
                    type: integer
                  pages_omitted:
                    type: integer
                  estimated_tokens:
                    type: integer
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/wiki/status:
    get:
      operationId: getWikiStatus
      summary: Small aggregate for a dashboard badge
      description: Page count plus the count of raw memories not yet folded into the wiki.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  pages:
                    type: integer
                  pending_compile:
                    type: integer
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/wiki/{slug}:
    get:
      operationId: getWikiPage
      summary: Read a single wiki page by title or slug
      description: Accepts either a page title or its slug; returns outgoing links and backlinks.
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WikiPage"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: No wiki page matching that title or slug.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/import:
    post:
      operationId: importFile
      summary: Import a chat export or document file (or directory) into the memory store
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [file_path]
              properties:
                file_path:
                  type: string
                  description: Absolute path, must lie inside REMIND_ME_IMPORT_ROOTS. A directory imports recursively.
                category:
                  type: string
                  default: chat_import
                tags:
                  type: array
                  items:
                    type: string
                  default: []
                extract_mode:
                  type: string
                  default: assistant_messages
                  enum: [assistant_messages, user_messages, all_messages, conversations, summaries]
                max_length:
                  type: integer
                  default: 10000
                kind:
                  type: string
                  default: auto
                  enum: [auto, chat, document]
      responses:
        "200":
          description: |
            Import result (single file) or bulk-import summary (directory) —
            shape depends on the target; see importer.py.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "415":
          $ref: "#/components/responses/UnsupportedMediaType"

  /api/export:
    get:
      operationId: exportMemories
      summary: Export memories to JSON or JSONL
      description: |
        Without `file_path`, the export payload is the raw response body
        (`curl .../api/export > backup.json`). With `file_path`, the export
        is written server-side inside `REMIND_ME_EXPORT_ROOTS` and a JSON
        summary is returned instead. Embedding vectors are never included
        (rebuild with `remind_me_reindex` / `POST /api/import` + reindex);
        records round-trip back in through `POST /api/import`, including the
        entity graph when `include_graph=true` (the default).
      parameters:
        - name: format
          in: query
          schema:
            type: string
            default: json
            enum: [json, jsonl]
        - $ref: "#/components/parameters/Category"
        - $ref: "#/components/parameters/Tags"
        - name: file_path
          in: query
          schema:
            type: string
        - name: include_graph
          in: query
          schema:
            type: boolean
            default: true
      responses:
        "200":
          description: |
            Without `file_path`: the raw export (`application/json` or
            `application/x-ndjson` depending on `format`). With `file_path`:
            a JSON write summary.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
            application/x-ndjson:
              schema:
                type: string
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          description: Server-side write failed (e.g. disk error).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: |
        `REMIND_ME_API_KEY`, or an auto-generated key persisted at
        `~/.remind-me/api_key` (0600) on first run. Every `/api/*` route
        requires it unless `REMIND_ME_API_KEY=disabled` is set. `/` and
        `/health` are always unauthenticated.

  parameters:
    Category:
      name: category
      in: query
      schema:
        type: string
    Tags:
      name: tags
      in: query
      description: Comma-separated; a memory must have ALL listed tags.
      schema:
        type: string

  requestBodies:
    MemoryUpdate:
      required: true
      content:
        application/json:
          schema:
            type: object
            description: All fields optional; only present, non-null fields are changed. At least one must be given.
            properties:
              content:
                type: string
              category:
                type: string
              source:
                type: string
              tags:
                type: array
                items:
                  type: string
              metadata:
                type: object

  responses:
    BadRequest:
      description: Invalid request (bad JSON, missing/invalid field, malformed query param).
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Unauthorized:
      description: Missing or incorrect bearer token.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            error: Unauthorized
    NotFound:
      description: No memory with that id.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    UnsupportedMediaType:
      description: "POST/PUT/PATCH under /api/ requires Content-Type: application/json."
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"

  schemas:
    Error:
      type: object
      properties:
        error:
          type: string
      required: [error]

    Memory:
      type: object
      description: |
        Every column of the `memories` table (`_row_to_dict` output) — `tags`
        and `metadata` are JSON-decoded. Additional lifecycle/graph columns
        exist beyond the ones listed here (schema evolves via migrations);
        treat this as the stable core, not an exhaustive/closed set.
      additionalProperties: true
      properties:
        id:
          type: string
        content:
          type: string
        category:
          type: string
        tags:
          type: array
          items:
            type: string
        source:
          type: string
        metadata:
          type: object
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        vitality:
          type: number
        status:
          type: string
        memory_type:
          type: string
          nullable: true
        subject:
          type: string
          nullable: true
        predicate:
          type: string
          nullable: true
        object:
          type: string
          nullable: true
        superseded_by:
          type: string
          nullable: true
        doc_id:
          type: string
          nullable: true
        chunk_index:
          type: integer
          nullable: true
        deleted_at:
          type: string
          format: date-time
          nullable: true
          description: |
            Tombstone timestamp (gap #11). Always null on a memory returned
            by any of these routes — a deleted memory is excluded from every
            read path — documented here only because it's a real column on
            the underlying row, mirroring superseded_by's treatment above.

    WikiPageSummary:
      type: object
      description: One row from the wiki catalogue (`GET /api/wiki`).
      properties:
        slug:
          type: string
        title:
          type: string
        summary:
          type: string
        updated_at:
          type: string
          format: date-time

    WikiLinkRef:
      type: object
      description: A link to/from another wiki page (used for both `links` and `backlinks`).
      properties:
        slug:
          type: string
        title:
          type: string

    WikiPage:
      type: object
      description: A single wiki page (`GET /api/wiki/{slug}`) with its outgoing links and backlinks.
      properties:
        slug:
          type: string
        title:
          type: string
        content:
          type: string
        summary:
          type: string
        updated_at:
          type: string
          format: date-time
        links:
          type: array
          items:
            $ref: "#/components/schemas/WikiLinkRef"
        backlinks:
          type: array
          items:
            $ref: "#/components/schemas/WikiLinkRef"

    WikiSearchResult:
      type: object
      description: One BM25-ranked hit from `GET /api/wiki/search`, with `[`/`]` bracket markers around matched terms in `snippet`.
      properties:
        slug:
          type: string
        title:
          type: string
        summary:
          type: string
        snippet:
          type: string
